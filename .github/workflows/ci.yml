name: CI/CD — Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  ACR_URL: ragv3acr.azurecr.io
  IMAGE: ragv3acr.azurecr.io/rag-production-v3
  RESOURCE_GROUP: rag-production-v3-rg
  CONTAINER_APP: rag-v3-app
  CONTAINER_ENV: rag-v3-env
  LOCATION: eastus
  SUBSCRIPTION: 903e7f42-b475-4585-a0b5-6d4453deb671

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision infrastructure
        run: |
          az group create \
            --name $RESOURCE_GROUP \
            --location $LOCATION \
            --subscription $SUBSCRIPTION

          az acr update \
            --name ragv3acr \
            --admin-enabled true \
            --subscription $SUBSCRIPTION

          az containerapp env create \
            --name $CONTAINER_ENV \
            --resource-group $RESOURCE_GROUP \
            --location $LOCATION \
            --subscription $SUBSCRIPTION \
            2>/dev/null || true

      - name: Deploy to Container Apps
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $IMAGE:latest \
            --min-replicas 1 \
            --set-env-vars \
              ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
              LANGSMITH_API_KEY="$LANGSMITH_API_KEY" \
              LANGSMITH_TRACING=true \
              LANGSMITH_PROJECT=rag-production-v3 \
            --subscription $SUBSCRIPTION

      - name: Route all traffic to latest revision
        run: |
          az containerapp ingress traffic set \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --revision-weight latest=100 \
            --subscription $SUBSCRIPTION

      - name: Print app URL
        run: |
          az containerapp show \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --subscription $SUBSCRIPTION \
            --query properties.configuration.ingress.fqdn \
            --output tsv
